<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>To-do List - Refatorando</title>
        <link rel="icon"
            href="https://cache.refatorando.com/wp-content/uploads/2023/05/Favicon_Refatorando-1-100x100.png"
            type="image/x-icon">
        <link rel="stylesheet" href="public/css/styles.css">
    </head>
    <body class="darkmode">
        <div class="container">
            <div class="head">
                <h1>To-do List</h1>
                <a href="#" class="darckmode-toggle"></a>
            </div>
            <input type="text" placeholder="Insira o To-do aqui...">
        <div class="itens">
            <input type="checkbox" checked>
            <span class="item-checked">Ler 10 paginas de um livro</span> 
        </div>
         <div class="itens">
            <input type="checkbox">
            <span>Meditar</span> 
        </div>
         <div class="itens">
            <input type="checkbox">
            <span>Editar 2 videos</span> 
        </div>
         <div class="itens">
            <input type="checkbox">
            <span>Criar Portifolio</span> 
        </div>
         <div class="itens">
            <input type="checkbox">
            <span>Academia</span> 
        </div>
        <div class="footer">
            <div>4 itens restantes</div>
            <div class="itens_footer">
                <a href="#" class="active">Todos</a>
                <a href="#">Ativos</a>
                <a href="#">Concludidos</a>
            </div>
            <a href="#">Limpreza Completa</a>
        </div>
        </div>
    </body>
</html>
